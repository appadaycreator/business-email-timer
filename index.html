const CAT_EMOJI = {game:'🎮',finance:'💰',health:'💪',productivity:'📋',travel:'✈️',advisor:'🔍'};
const CAT_LABEL = {game:'ゲーム',finance:'計算機/お金',health:'健康',productivity:'生産性',travel:'旅行',advisor:'診断/アドバイス'};
const BASE_URL = 'https://appadaycreator.com/';

let currentCat = 'all';
let currentQuery = '';

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildCard(svc) {
  const emoji = CAT_EMOJI[svc.cat] || '🔧';
  const badgeClass = 'cat-badge-' + svc.cat;
  const title = escapeHtml(svc.title);
  const desc = escapeHtml(svc.desc);
  const label = CAT_LABEL[svc.cat] || svc.cat;
  return `<a href="${BASE_URL}${svc.dir}/" class="card bg-white rounded-xl shadow-sm p-4 flex flex-col hover:shadow-md border border-gray-100" data-cat="${svc.cat}" data-title="${title.toLowerCase()}" aria-label="${title}">
    <div class="text-2xl mb-2">${emoji}</div>
    <h3 class="font-bold text-gray-800 text-sm leading-snug mb-1 flex-1">${title}</h3>
    <p class="text-xs text-gray-500 mb-2 leading-relaxed line-clamp-2">${desc}</p>
    <span class="inline-block text-xs rounded-full px-2 py-0.5 ${badgeClass} font-medium self-start">${label}</span>
  </a>`;
}

function render() {
  const grid = document.getElementById('service-grid');
  const q = currentQuery.toLowerCase();
  const filtered = SERVICES.filter(s => {
    const catOk = currentCat === 'all' || s.cat === currentCat;
    const queryOk = !q || s.title.toLowerCase().includes(q) || s.dir.includes(q) || s.desc.toLowerCase().includes(q);
    return catOk && queryOk;
  });
  grid.innerHTML = filtered.map(buildCard).join('');
  document.getElementById('result-count').textContent = filtered.length + '件のサービス';
  document.getElementById('no-result').classList.toggle('hidden', filtered.length > 0);
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('#cat-tabs .tab').forEach(t => {
    t.classList.remove('tab-active');
    if (!t.classList.contains('bg-amber-100') && !t.classList.contains('bg-green-100')) {
      t.classList.add('bg-gray-100','text-gray-700');
    }
  });
  el.classList.add('tab-active');
  el.classList.remove('bg-gray-100','text-gray-700');
  render();
}

document.getElementById('search-input').addEventListener('input', function() {
  currentQuery = this.value.trim();
  if (currentQuery) {
    currentCat = 'all';
    document.querySelectorAll('#cat-tabs .tab').forEach(t => t.classList.remove('tab-active'));
    document.querySelector('[data-cat="all"]').classList.add('tab-active');
  }
  render();
});

// Initial render
render();
</script>
